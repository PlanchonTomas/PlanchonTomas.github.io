<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dólar</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #1d2f25;
            --surface: #243a30;
            --surface-light: #2f503f;
            --accent: #d9b44a;
            --accent-dark: #b08b33;
            --text: #000000;
            --muted: #b4b09b;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(217, 180, 74, 0.18), transparent 20%),
                        radial-gradient(circle at bottom right, rgba(45, 160, 120, 0.12), transparent 18%),
                        linear-gradient(135deg, #16241f 0%, #1f3429 35%, #25382e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        main {
            width: min(100%, 430px);
            padding: 2rem;
            border-radius: 2rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        main::before,
        main::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
        }

        main::before {
            width: 400px;
            height: 200px;
            top: -60px;
            right: -60px;
            background: radial-gradient(circle, rgba(217,180,74,0.8), transparent 55%);
        }

        main::after {
            width: 400px;
            height: 300px;
            bottom: -120px;
            left: -120px;
            background: radial-gradient(circle, rgba(45,160,120,0.7), transparent 55%);
        }

        h2 {
            margin: 0 0 0.4rem;
            font-size: clamp(2rem, 5vw, 2.5rem);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
        }

        h2::after {
            content: '💵';
            position: absolute;
            right: 0;
            top: 0;
            font-size: 1.1em;
        }

        h3 {color: white;}

        p {
            margin: 0 0 1.8rem;
            color: var(--muted);
            line-height: 1.6;
        }

        label {
            display: block;
            margin: 1rem 0 0.4rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        input,
        select {
            width: 100%;
            padding: 1rem 1.1rem;
            border-radius: 1rem;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: rgba(217,180,74,0.75);
            background: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }

        button {
            width: 100%;
            margin-top: 1.6rem;
            padding: 1rem 1.2rem;
            border: none;
            border-radius: 1.2rem;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #d9b44a 0%, #b08b33 100%);
            color: #111;
            cursor: pointer;
            box-shadow: 0 18px 35px rgba(28, 29, 27, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 10px 22px rgba(28, 29, 27, 0.3);
        }

        #result {
            margin-top: 1.8rem;
            padding: 1.4rem;
            border-radius: 1.5rem;
            background: rgba(38, 56, 44, 0.9);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
        }

        #message {
            margin: 0;
            font-size: 0.98rem;
            line-height: 1.6;
            color: var(--text);
        }

        @media (max-width: 420px) {
            body {
                padding: 1.2rem;
            }

            main {
                padding: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h3>Conversor ARS → USD 💵</h3>
        <p>Ingresa una cantidad en pesos argentinos y selecciona el tipo de dólar.</p>

        <label for="arsAmount">Pesos argentinos (ARS):</label>
        <input id="arsAmount" type="number" min="0" step="0.01" placeholder="Ej. 1000" />

        <label for="rateType">Tipo de dólar:</label>
        <select id="rateType"></select>

        <button id="convertButton">Convertir</button>

        <section id="result" aria-live="polite">
            <p id="message">Cargando valores de la API...</p>
        </section>
    </main>
</body>
<script src="function.js"></script>
</html>
