<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        button {
            background-color: #333;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #555;
        }
        #categorias {
            margin: 20px 0;
        }
        #preguntas {
            margin-top: 20px;
        }
        .pregunta {
            background-color: #1a1a1a;
            border: 2px solid white;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 5px;
        }
        .feedback {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
 <button onclick="fetchPreguntas()">Cargar Preguntas</button>
 <div id="categorias">
    <button onclick="mostrarPreguntas(this.textContent)">Prehistoria</button>
    <button onclick="mostrarPreguntas(this.textContent)">Edad Antigua</button>
    <button onclick="mostrarPreguntas(this.textContent)">Alta Edad Media</button>
    <button onclick="mostrarPreguntas(this.textContent)">Plena Edad Media</button>
    <button onclick="mostrarPreguntas(this.textContent)">Baja Edad Media</button>
    <button onclick="mostrarPreguntas(this.textContent)">Edad Moderna</button>
 </div>
 <div id="preguntas"></div>
</body>
<script src="funciones.js"></script>
</html>
